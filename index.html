<!DOCTYPE html>
<html lang="ja">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, user-scalable=no">

  <meta
    name="apple-mobile-web-app-capable"
    content="yes">

  <meta
    name="apple-mobile-web-app-status-bar-style"
    content="black-translucent">

  <title>QRコード照合アプリ</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>

    * {
      box-sizing: border-box;
    }

    html,
    body {

      margin: 0;
      padding: 0;

      width: 100%;
      height: 100dvh;

      overflow: hidden;

      background: #ffffff;

      font-family: sans-serif;

      text-align: center;

      transition: background 0.3s;
    }

    body {
      touch-action: manipulation;
    }

    .container {

      height: 100dvh;

      display: flex;
      flex-direction: column;

      padding: 8px;

      overflow: hidden;
    }

    .top-bar {

      display: flex;

      justify-content: space-between;

      align-items: center;

      gap: 8px;

      margin-bottom: 6px;
    }

    #result {

      font-size: 20px;

      font-weight: bold;

      min-height: 28px;

      text-align: left;

      flex: 1;
    }

    .success {
      color: #008a00;
    }

    .error {
      color: #d6006b;
    }

    button {

      border: none;

      border-radius: 8px;

      cursor: pointer;
    }

    .scan-btn {

      background: #007aff;

      color: white;

      padding: 10px 14px;

      font-size: 14px;
    }

    .reset-btn {

      background: #999;

      color: white;

      padding: 10px 14px;

      font-size: 14px;
    }

    .csv-btn {

      background: #009688;

      color: white;

      padding: 10px 14px;

      font-size: 14px;
    }

    h1 {

      margin: 2px 0;

      font-size: 22px;
    }

    p {

      margin: 2px 0 6px;

      font-size: 13px;

      line-height: 1.3;
    }

    #count {

      margin: 4px 0;

      font-size: 20px;
    }

    #reader {

      width: 100%;
      max-width: 280px;

      margin: 0 auto;

      flex-shrink: 0;

      overflow: hidden;

      border-radius: 12px;
    }

    #status {

      margin-top: 6px;

      font-size: 16px;

      font-weight: bold;
    }

    #summary {

      margin-top: 8px;

      padding: 8px;

      border-radius: 10px;

      background: rgba(0,0,0,0.05);

      font-size: 14px;

      line-height: 1.7;
    }

    .button-row {

      display: flex;

      gap: 8px;

      margin-top: 8px;
    }

    .button-row button {

      flex: 1;
    }

    ul {

      list-style: none;

      padding: 0;

      margin: 6px 0 0;

      flex: 1;

      overflow: auto;
    }

    li {

      margin-bottom: 4px;

      padding: 6px;

      border-radius: 8px;

      font-size: 12px;

      word-break: break-all;

      color: #000;
    }

    .match {

      background: #dff6dd;
      border: 2px solid #66bb66;
    }

    .mismatch {

      background: #ffddee;
      border: 2px solid #ff6699;
    }

  </style>

</head>

<body>

  <div class="container">

    <div class="top-bar">

      <button
        class="scan-btn"
        onclick="enableScan()">

        読み取る

      </button>

      <div id="result"></div>

      <button
        class="reset-btn"
        onclick="resetApp()">

        リセット

      </button>

    </div>

    <h1>QRコード照合</h1>

    <p>
      QRコードをカメラに映してから<br>
      「読み取る」を押してください
    </p>

    <h2 id="count">
      0 / 4
    </h2>

    <div id="reader"></div>

    <div id="status">
      待機中
    </div>

    <div id="summary">

      <div>
        Total：
        <span id="totalCount">0</span>
      </div>

      <div>
        OK：
        <span id="successCount">0</span>
      </div>

      <div>
        NG：
        <span id="errorCount">0</span>
      </div>

    </div>

    <div class="button-row">

      <button
        class="csv-btn"
        onclick="exportCSV()">

        CSV保存

      </button>

      <button
        class="reset-btn"
        onclick="clearHistory()">

        履歴削除

      </button>

    </div>

    <ul id="list"></ul>

  </div>

  <script>

    let scanned = [];
    let canScan = false;
    let html5QrCodeScanner = null;
    let stopped = false;

    let audioContext = null;

    let totalCount = 0;
    let successCount = 0;
    let errorCount = 0;

    const STORAGE_KEY = "qrHistory";

    const list =
      document.getElementById("list");

    const result =
      document.getElementById("result");

    const count =
      document.getElementById("count");

    const status =
      document.getElementById("status");

    const totalCountEl =
      document.getElementById("totalCount");

    const successCountEl =
      document.getElementById("successCount");

    const errorCountEl =
      document.getElementById("errorCount");

    function loadHistory() {

      const history = JSON.parse(
        sessionStorage.getItem(STORAGE_KEY) || "[]"
      );

      totalCount =
        history.length;

      successCount =
        history.filter(
          item => item.result === "OK"
        ).length;

      errorCount =
        history.filter(
          item => item.result === "NG"
        ).length;

      updateSummary();
    }

    function updateSummary() {

      totalCountEl.textContent =
        totalCount;

      successCountEl.textContent =
        successCount;

      errorCountEl.textContent =
        errorCount;
    }

    function playBeep() {

      if (!audioContext) {

        audioContext =
          new (
            window.AudioContext ||
            window.webkitAudioContext
          )();
      }

      const oscillator =
        audioContext.createOscillator();

      const gainNode =
        audioContext.createGain();

      oscillator.connect(gainNode);

      gainNode.connect(
        audioContext.destination
      );

      oscillator.type = "sine";

      oscillator.frequency.value = 1000;

      oscillator.start();

      gainNode.gain.exponentialRampToValueAtTime(
        0.00001,
        audioContext.currentTime + 0.15
      );

      oscillator.stop(
        audioContext.currentTime + 0.15
      );
    }

    function updateUI() {

      count.textContent =
        `${scanned.length} / 4`;

      list.innerHTML = "";

      const firstCode =
        scanned[0];

      scanned.forEach((code, index) => {

        const li =
          document.createElement("li");

        li.textContent =
          `DATA ${index + 1}\n${code}`;

        if (
          index === 0 ||
          code === firstCode
        ) {

          li.classList.add("match");

        } else {

          li.classList.add("mismatch");
        }

        list.appendChild(li);
      });
    }

    function showSuccess() {

      result.textContent =
        "OK";

      result.className =
        "success";

      document.body.style.background =
        "#dff6dd";
    }

    function showError() {

      result.textContent =
        "NG";

      result.className =
        "error";

      document.body.style.background =
        "#ffddee";
    }

    function enableScan() {

      if (stopped) return;

      if (canScan) return;

      if (scanned.length >= 4) {

        alert("4件読み取り済みです");

        return;
      }

      canScan = true;

      status.textContent =
        "読み取り待機中...";
    }

    function saveHistory(resultValue) {

      const history = JSON.parse(
        sessionStorage.getItem(STORAGE_KEY) || "[]"
      );

      const record = {

        count:
          history.length + 1,

        timestamp:
          formatDate(new Date()),

        result:
          resultValue,

        data: [
          scanned[0] || "",
          scanned[1] || "",
          scanned[2] || "",
          scanned[3] || ""
        ]
      };

      history.push(record);

      sessionStorage.setItem(
        STORAGE_KEY,
        JSON.stringify(history)
      );
    }

    function formatDate(date) {

      const y =
        date.getFullYear();

      const m =
        String(
          date.getMonth() + 1
        ).padStart(2, "0");

      const d =
        String(
          date.getDate()
        ).padStart(2, "0");

      const h =
        String(
          date.getHours()
        ).padStart(2, "0");

      const mi =
        String(
          date.getMinutes()
        ).padStart(2, "0");

      const s =
        String(
          date.getSeconds()
        ).padStart(2, "0");

      return `${y}-${m}-${d} ${h}:${mi}:${s}`;
    }

    async function onScanSuccess(decodedText) {

      if (!canScan) return;

      if (stopped) return;

      canScan = false;

      scanned.push(decodedText);

      updateUI();

      playBeep();

      navigator.vibrate?.(200);

      status.textContent =
        `DATA ${scanned.length} 読み取り完了`;

      if (scanned.length === 4) {

        const firstCode =
          scanned[0];

        const allMatch =
          scanned.every(
            code => code === firstCode
          );

        if (allMatch) {

          showSuccess();

          status.textContent =
            "OK";

          saveHistory("OK");

        } else {

          showError();

          status.textContent =
            "NG";

          saveHistory("NG");
        }

        loadHistory();

        stopped = true;

        if (html5QrCodeScanner) {

          try {
            await html5QrCodeScanner.clear();
          } catch (e) {}
        }
      }
    }

    function exportCSV() {

      const history = JSON.parse(
        sessionStorage.getItem(STORAGE_KEY) || "[]"
      );

      if (history.length === 0) {

        alert("保存データがありません");

        return;
      }

      let csv =
        "count,timestamp,result,data1,data2,data3,data4\n";

      history.forEach(item => {

        csv += [

          item.count,

          item.timestamp,

          item.result,

          item.data[0],

          item.data[1],

          item.data[2],

          item.data[3]

        ].join(",") + "\n";
      });

      const bom =
        "\uFEFF";

      const blob =
        new Blob(
          [bom + csv],
          {
            type:
              "text/csv;charset=utf-8;"
          }
        );

      const link =
        document.createElement("a");

      const now =
        new Date();

      const fileName =
        `qr_history_${formatDate(now)
          .replace(/[: ]/g, "_")}.csv`;

      link.href =
        URL.createObjectURL(blob);

      link.download =
        fileName;

      link.click();
    }

    function clearHistory() {

      const ok =
        confirm(
          "保存履歴を削除しますか？"
        );

      if (!ok) return;

      sessionStorage.removeItem(
        STORAGE_KEY
      );

      totalCount = 0;
      successCount = 0;
      errorCount = 0;

      updateSummary();

      alert("履歴を削除しました");
    }

    function startCamera() {

      document.getElementById("reader").innerHTML = "";

      html5QrCodeScanner =
        new Html5QrcodeScanner(
          "reader",
          {
            fps: 10,
            qrbox: 220,
            aspectRatio: 1
          },
          false
        );

      html5QrCodeScanner.render(
        onScanSuccess
      );
    }

    async function resetApp() {

      scanned = [];

      canScan = false;

      stopped = false;

      result.textContent = "";

      result.className = "";

      list.innerHTML = "";

      count.textContent = "0 / 4";

      status.textContent = "待機中";

      document.body.style.background =
        "#ffffff";

      if (html5QrCodeScanner) {

        try {
          await html5QrCodeScanner.clear();
        } catch (e) {}
      }

      startCamera();
    }

    loadHistory();

    startCamera();

  </script>

</body>

</html>
