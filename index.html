<!DOCTYPE html>
<html lang="ja">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, user-scalable=no">

  <meta
    name="apple-mobile-web-app-capable"
    content="yes">

  <meta
    name="apple-mobile-web-app-status-bar-style"
    content="black-translucent">

  <title>QRコード照合アプリ</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>

    * {
      box-sizing: border-box;
    }

    html,
    body {

      margin: 0;
      padding: 0;

      width: 100%;
      height: 100dvh;

      overflow: hidden;

      background: #ffffff;

      font-family: sans-serif;

      text-align: center;

      transition: background 0.3s;
    }

    body {
      touch-action: manipulation;
    }

    .container {

      height: 100dvh;

      display: flex;
      flex-direction: column;

      padding: 8px;

      overflow: hidden;
    }

    .top-bar {

      display: flex;

      justify-content: space-between;

      align-items: center;

      gap: 8px;

      margin-bottom: 6px;
    }

    #result {

      font-size: 20px;

      font-weight: bold;

      min-height: 28px;

      text-align: left;

      flex: 1;
    }

    .success {
      color: #008a00;
    }

    .error {
      color: #d6006b;
    }

    button {

      border: none;

      border-radius: 8px;

      cursor: pointer;
    }

    .scan-btn {

      background: #007aff;

      color: white;

      padding: 10px 14px;

      font-size: 14px;
    }

    .reset-btn {

      background: #999;

      color: white;

      padding: 10px 14px;

      font-size: 14px;
    }

    h1 {

      margin: 2px 0;

      font-size: 22px;
    }

    p {

      margin: 2px 0 6px;

      font-size: 13px;

      line-height: 1.3;
    }

    #count {

      margin: 4px 0;

      font-size: 20px;
    }

    #reader {

      width: 100%;
      max-width: 280px;

      margin: 0 auto;

      flex-shrink: 0;

      overflow: hidden;

      border-radius: 12px;
    }

    #status {

      margin-top: 6px;

      font-size: 16px;

      font-weight: bold;
    }

    ul {

      list-style: none;

      padding: 0;

      margin: 6px 0 0;

      flex: 1;

      overflow-y: auto;
    }

    li {

      margin-bottom: 6px;

      padding: 8px;

      border-radius: 8px;

      font-size: 12px;

      word-break: break-all;

      text-align: left;
    }

  </style>

</head>

<body>

  <div class="container">

    <div class="top-bar">

      <button
        class="scan-btn"
        onclick="enableScan()">

        読み取る

      </button>

      <div id="result"></div>

      <button
        class="reset-btn"
        onclick="resetApp()">

        リセット

      </button>

    </div>

    <h1>QRコード照合</h1>

    <p>
      QRコードをカメラに映してから<br>
      「読み取る」を押してください
    </p>

    <h2 id="count">
      0 / 4
    </h2>

    <div id="reader"></div>

    <div id="status">
      待機中
    </div>

    <ul id="list"></ul>

  </div>

  <script>

    let scanned = [];

    let canScan = false;

    let html5QrCodeScanner = null;

    let stopped = false;

    let lastScanned = "";

    let lastScanTime = 0;

    const list =
      document.getElementById("list");

    const result =
      document.getElementById("result");

    const count =
      document.getElementById("count");

    const status =
      document.getElementById("status");

    function playBeep() {

      const audioContext =
        new (
          window.AudioContext ||
          window.webkitAudioContext
        )();

      const oscillator =
        audioContext.createOscillator();

      const gainNode =
        audioContext.createGain();

      oscillator.connect(gainNode);

      gainNode.connect(
        audioContext.destination
      );

      oscillator.type = "sine";

      oscillator.frequency.value = 1000;

      oscillator.start();

      gainNode.gain.exponentialRampToValueAtTime(
        0.00001,
        audioContext.currentTime + 0.15
      );

      oscillator.stop(
        audioContext.currentTime + 0.15
      );
    }

    function groupCodes() {

      const groups = {};

      scanned.forEach(code => {

        const normalized =
          code.trim();

        if (!groups[normalized]) {

          groups[normalized] = [];
        }

        groups[normalized].push(code);
      });

      return groups;
    }

    function updateUI() {

      count.textContent =
        `${scanned.length} / 4`;

      list.innerHTML = "";

      const groups =
        groupCodes();

      const colors = [
        "#dff6dd",
        "#ddeeff",
        "#fff4cc",
        "#ffddee",
        "#eeeeee"
      ];

      let groupNo = 0;

      Object.entries(groups)
        .sort((a, b) =>
          b[1].length - a[1].length
        )
        .forEach(
          ([key, values]) => {

            const color =
              values.length === 1
                ? "#ffcccc"
                : colors[groupNo % colors.length];

            values.forEach((code) => {

              const li =
                document.createElement("li");

              li.style.background =
                color;

              li.innerHTML = `
                <strong>
                  グループ${groupNo + 1}
                </strong>
                （${values.length}件一致）
                <br><br>
                ${code}
              `;

              list.appendChild(li);
            });

            groupNo++;
          }
        );
    }

    function enableScan() {

      if (stopped) return;

      if (scanned.length >= 4) {

        alert("4件読み取り済みです");

        return;
      }

      canScan = true;

      status.textContent =
        "読み取り待機中...";
    }

    function onScanSuccess(decodedText) {

      if (!canScan) return;

      if (stopped) return;

      decodedText =
        decodedText.trim();

      const now = Date.now();

      if (
        decodedText === lastScanned &&
        now - lastScanTime < 1500
      ) {
        return;
      }

      lastScanned =
        decodedText;

      lastScanTime =
        now;

      canScan = false;

      scanned.push(decodedText);

      updateUI();

      playBeep();

      navigator.vibrate?.(200);

      status.textContent =
        `${scanned.length} 件読み取り`;

      if (scanned.length === 4) {

        const groups =
          Object.keys(groupCodes()).length;

        result.textContent =
          `${groups} グループ検出`;

        result.className =
          groups === 1
            ? "success"
            : "error";

        document.body.style.background =
          groups === 1
            ? "#dff6dd"
            : "#fff0f0";

        status.textContent =
          "4件読み取り完了";

        stopped = true;
      }
    }

    function startCamera() {

      document.getElementById("reader").innerHTML = "";

      html5QrCodeScanner =
        new Html5QrcodeScanner(
          "reader",
          {
            fps: 10,
            qrbox: 220,
            aspectRatio: 1
          },
          false
        );

      html5QrCodeScanner.render(
        onScanSuccess
      );
    }

    async function resetApp() {

      scanned = [];

      canScan = false;

      stopped = false;

      lastScanned = "";

      lastScanTime = 0;

      result.textContent = "";

      result.className = "";

      list.innerHTML = "";

      count.textContent = "0 / 4";

      status.textContent = "待機中";

      document.body.style.background =
        "#ffffff";

      if (html5QrCodeScanner) {

        try {

          await html5QrCodeScanner.clear();

        } catch (e) {}
      }

      startCamera();
    }

    startCamera();

  </script>

</body>

</html>
